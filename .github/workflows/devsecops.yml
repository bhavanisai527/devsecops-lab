name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  # check Terraform code is valid before doing anything else
  terraform-ci:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform


  # build Docker image, scan for vulnerabilities, push to ECR
  # only runs if Terraform check passes
  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: terraform-ci
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # connect to AWS using my credentials stored in GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # log into ECR so Docker can push my image
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # build my Laravel image and tag it with the ECR URL
      - name: Build Docker image
        run: |
          docker build -t laravel-lab .
          docker tag laravel-lab:latest ${{ secrets.ECR_REPOSITORY_URL }}:latest
        working-directory: app/laravel

      # scan PHP dependencies for known vulnerabilities
      - name: Scan with Snyk
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=app/laravel/composer.lock --severity-threshold=high

      # push image to ECR so EC2 can pull it
      - name: Push image to ECR
        run: docker push ${{ secrets.ECR_REPOSITORY_URL }}:latest


  # tell EC2 to pull the new image and restart the app
  # only runs if build and scan passes
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # send commands to EC2 to pull latest image and restart the container
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids $(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=devsecops-lab-ec2" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text) \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URL }}",
              "docker pull ${{ secrets.ECR_REPOSITORY_URL }}:latest",
              "docker stop laravel || true",
              "docker rm laravel || true",
              "docker run -d --name laravel -p 8000:80 ${{ secrets.ECR_REPOSITORY_URL }}:latest"
            ]'